<style>
  :root{--ink:#15213B;--inkSoft:#5A6B86;--paper:#EFF1EC;--panel:#FBFBF8;--rule:#D3D8CE;
        --shu:#CF3F22;--shuSoft:#F6E5DF;--chip:#E6EAE0;--amber:#C98A2B;--amberSoft:#F5EAD4;--grn:#2E7D6B;--line:#2C3E6B}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:'Noto Sans JP',system-ui,sans-serif;background:#DADED3;color:var(--ink);display:flex;justify-content:center;overflow:hidden}
  .mono{font-family:'Roboto Mono',monospace;font-variant-numeric:tabular-nums}
  #app{width:100%;max-width:430px;height:100vh;background:var(--paper);display:flex;flex-direction:column;box-shadow:0 0 40px rgba(21,33,59,.15);position:relative;overflow:hidden}
  #top{flex:0 0 auto;background:var(--ink);color:var(--paper);padding:12px 18px;cursor:pointer}
  #top .ey{font-size:10px;letter-spacing:3px;color:#9FB0CC}
  #top .r{display:flex;justify-content:space-between;align-items:baseline;margin-top:3px}
  #top h1{margin:0;font-size:18px;font-weight:700}
  #top .sub{font-size:11px;color:#9FB0CC}
  #daytabs{flex:0 0 auto;display:flex;gap:2px;padding:6px 10px;background:var(--panel);border-bottom:1px solid var(--rule);overflow-x:auto}
  #daytabs::-webkit-scrollbar{display:none}
  .dtab{flex:1 0 auto;background:transparent;border:none;cursor:pointer;padding:3px 12px 6px;border-bottom:3px solid transparent}
  .dtab.on{border-bottom-color:var(--shu)}
  .dtab .d{font-size:10px;font-weight:600;color:var(--inkSoft)} .dtab.on .d{color:var(--ink)}
  .dtab .l{font-size:13px;color:var(--inkSoft)} .dtab.on .l{font-weight:700;color:var(--ink)}
  .dtab .dt{font-size:9px;color:var(--inkSoft)}
  #views{position:relative;flex:1 1 auto;min-height:0}
  .view{position:absolute;inset:0;display:none}
  .view.scroll{overflow-y:auto;padding:14px 16px 20px}
  #nav{flex:0 0 auto;display:flex;background:var(--panel);border-top:1px solid var(--rule);padding-bottom:env(safe-area-inset-bottom)}
  .nb{flex:1;background:transparent;border:none;cursor:pointer;padding:8px 0 10px;display:flex;flex-direction:column;align-items:center;gap:2px}
  .nb .ic{font-size:18px;filter:grayscale(.4);opacity:.7}
  .nb.on .ic{filter:none;opacity:1}
  .nb .lb{font-size:10px;font-weight:500;color:var(--inkSoft)} .nb.on .lb{font-weight:700;color:var(--ink)}
  .trow{display:flex;gap:9px}
  .ttime{width:44px;flex:0 0 44px;text-align:right;padding-top:1px}
  .ttime .s{font-size:15px;font-weight:600;color:var(--ink)} .ttime .s.cf{color:var(--shu)}
  .ttime .e{font-size:9.5px;color:var(--inkSoft)}
  .tnode{width:16px;flex:0 0 16px;display:flex;flex-direction:column;align-items:center}
  .tdot{width:13px;height:13px;border-radius:50%;background:var(--panel);margin-top:3px;z-index:1}
  .tbar{width:3px;flex:1;background:var(--line);opacity:.45;margin:1px 0}
  .tcard{flex:1;margin-bottom:11px;background:var(--panel);border:1px solid var(--rule);border-radius:12px;padding:9px 11px;cursor:pointer}
  .tcard:active{background:#fff}
  .tcard.cf{border-color:var(--shu)}
  .tcard .h{display:flex;align-items:center;gap:7px}
  .tcard .ti{font-size:14.5px;font-weight:700;flex:1}
  .tcard .ed{font-size:12px;color:var(--inkSoft)}
  .tcard .ar{font-size:12px;color:var(--inkSoft);margin-top:3px}
  .tcard .mm{font-size:11.5px;color:var(--inkSoft);margin-top:4px}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-size:11px;font-weight:600;padding:3px 8px;border-radius:7px}
  .sbtn{background:var(--chip);border:none;border-radius:8px;min-width:30px;height:28px;padding:0 8px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;font-weight:700;color:var(--ink)}
  .durrow{display:flex;align-items:center;gap:5px}
  .btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;gap:5px}
  .btn:active{transform:scale(.96)}
  .btn.p{background:var(--ink);color:#fff} .btn.s{background:var(--chip);color:var(--ink)} .btn.shu{background:var(--shu);color:#fff}
  .note{font-size:11px;color:var(--inkSoft);line-height:1.6;margin-top:12px}
  #v-map{display:flex;flex-direction:column}
  #map{flex:1 1 auto;min-height:0;background:#cfd6cd}
  #map,#map *{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  .pin{width:30px;height:30px;border-radius:50% 50% 50% 0;background:var(--panel);border:3px solid var(--c,#2C3E6B);transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.3)}
  .pin span{transform:rotate(45deg);font-size:14px}
  .photopin{width:46px;height:46px;border-radius:10px;border:3px solid var(--shu);overflow:hidden;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.35)}
  .photopin img{width:100%;height:100%;object-fit:cover;display:block}
  .leaflet-popup-content{margin:9px 12px;font-family:'Noto Sans JP',sans-serif}
  .pop b{font-size:13px}.pop .t{font-size:11px;color:var(--inkSoft)}.pop img{width:140px;border-radius:6px;margin-top:6px;display:block}
  #mappanel{flex:0 0 auto;height:36%;background:var(--panel);border-top:1px solid var(--rule);border-radius:16px 16px 0 0;margin-top:-14px;z-index:500;display:flex;flex-direction:column;box-shadow:0 -6px 20px rgba(21,33,59,.08)}
  #mhandle{width:38px;height:4px;background:var(--rule);border-radius:9px;margin:8px auto 4px}
  #mbar{display:flex;gap:7px;padding:2px 14px 9px;border-bottom:1px solid var(--rule);align-items:center}
  #mlist{flex:1;overflow-y:auto;padding:9px 14px 16px}
  .row{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;cursor:pointer}
  .row:active{background:var(--chip)}
  .dot{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
  .row .nm{font-size:13.5px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .tm{font-size:11px;color:var(--inkSoft)}
  .strip{display:flex;gap:8px;overflow-x:auto;padding:2px 0 6px}
  .ph{flex:0 0 auto;width:74px}
  .ph .im{width:74px;height:74px;border-radius:10px;object-fit:cover;border:1px solid var(--rule);background:var(--chip);display:block;cursor:pointer}
  .ph .cap{font-size:9.5px;margin-top:3px;text-align:center}.ph .cap.ok{color:var(--grn)}.ph .cap.no{color:var(--shu);text-decoration:underline;cursor:pointer}
  .sec{font-size:11px;font-weight:700;color:var(--inkSoft);margin:4px 0 8px;letter-spacing:.5px}
  .empty{font-size:12px;color:var(--inkSoft);padding:12px 4px;line-height:1.6}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--panel);border-radius:18px 18px 0 0;box-shadow:0 -8px 30px rgba(21,33,59,.25);padding:14px 18px calc(16px + env(safe-area-inset-bottom));transform:translateY(120%);transition:transform .25s;z-index:1000;max-height:90%;overflow-y:auto}
  .sheet.on{transform:translateY(0)}
  .sheet h3{margin:2px 0 10px;font-size:15px}
  .sheetx{position:absolute;top:10px;right:12px;width:34px;height:34px;border:none;border-radius:50%;background:var(--chip);color:var(--ink);font-size:17px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3}
  .sheetx:active{transform:scale(.92)}
  label{display:block;font-size:11px;color:var(--inkSoft);font-weight:700;margin:9px 0 4px}
  input,select,textarea{width:100%;font-family:inherit;font-size:13px;color:var(--ink);border:1px solid var(--rule);border-radius:9px;padding:9px;background:#fff}
  textarea{resize:vertical;min-height:46px}
  .ckline{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink);font-weight:600;margin:12px 0 2px}
  .ckline input{width:auto}
  .edrow{display:flex;gap:9px}.edrow>div{flex:1}
  .edbtns{display:flex;gap:8px;margin-top:14px}
  #placebar{position:absolute;left:14px;right:14px;top:60px;background:var(--shu);color:#fff;z-index:600;border-radius:12px;padding:10px 14px;font-size:12.5px;font-weight:700;display:none;align-items:center;justify-content:space-between;box-shadow:0 4px 14px rgba(207,63,34,.4)}
  #placebar.on{display:flex}
  #placebar button{background:rgba(255,255,255,.25);color:#fff;border:none;border-radius:8px;padding:5px 10px;font-weight:700;cursor:pointer}
  .pkitem{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--rule);border-radius:10px;padding:10px 12px;margin-bottom:7px;cursor:pointer}
  .pkck{width:20px;height:20px;border-radius:6px;border:2px solid var(--rule);flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
  .pkitem .nm{font-size:13.5px;flex:1}
  .pkdone{opacity:.5}.pkdone .nm{text-decoration:line-through}.pkdone .pkck{background:var(--grn);border-color:var(--grn)}
  .barwrap{height:9px;background:var(--chip);border-radius:99px;overflow:hidden}
  .seg{height:100%;border-radius:99px}
  .bk{background:var(--ink);color:var(--paper);border-radius:16px;padding:16px 18px}
  .catrow{cursor:pointer;border-radius:10px;padding:6px;margin:0 -6px}
  .catrow:active{background:var(--chip)}
  #toast{position:absolute;left:50%;bottom:120px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:12px;font-weight:600;padding:8px 14px;border-radius:99px;opacity:0;transition:opacity .2s;z-index:1200;pointer-events:none;white-space:nowrap}
  #toast.on{opacity:1}
  .backrow{font-size:11px;color:#9FB0CC;margin-bottom:6px;cursor:pointer}
  #shiori{display:none;position:absolute;inset:0;overflow-y:auto;background:var(--paper);z-index:5;padding-bottom:96px}
  .shead{background:var(--ink);color:var(--paper);padding:16px 18px}
  .shead .sttl{font-size:20px;font-weight:700}
  .shead .ssub{font-size:11px;color:#9FB0CC;margin-top:2px}
  .syear{font-family:'Roboto Mono',monospace;font-size:15px;font-weight:700;color:var(--ink);padding:16px 16px 8px;letter-spacing:1px}

  const W=300,H=168;let inner='';

    const pad=30,rLa=Math.max(maxLa-minLa,0.02),rLo=Math.max(maxLo-minLo,0.02);
    const X=lo=>pad+(lo-minLo)/rLo*(W-2*pad),Y=la=>H-pad-(la-minLa)/rLa*(H-2*pad);

    inner=line+dots;
  }else{

  let h=`<div style="display:flex;align-items:center;justify-content:space-between;background:var(--ink);color:var(--paper);border-radius:14px;padding:12px 14px"><div><div class="mono" style="font-size:10px;letter-spacing:2px;color:#9FB0CC">DAY ${d.n} · ${dDate(state.day)} · いま</div><div class="mono" style="font-size:30px;font-weight:700;line-height:1.1">${fmt(now)}</div></div><div style="display:flex;gap:8px"><button class="btn" style="background:rgba(255,255,255,.12);width:38px;height:38px;font-size:18px;color:#fff" onclick="bump(-15)">‹</button><button class="btn" style="background:rgba(255,255,255,.12);width:38px;height:38px;font-size:18px;color:#fff" onclick="bump(15)">›</button></div></div><div style="font-size:10.5px;color:var(--inkSoft);text-align:center;margin-top:6px">← デモ：時刻を動かすと「次の予定」が変わる →</div>`;
  if(cur)h+=`<div style="font-size:12px;color:var(--inkSoft);margin-top:14px">いま：${cur.icon||''} ${esc(cur.title)}</div>`;
  if(next){h+=`<div style="margin-top:8px;background:var(--panel);border:2px solid var(--shu);border-radius:16px;overflow:hidden"><div style="background:var(--shu);color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;padding:5px 14px">次の予定</div><div style="padding:14px 16px 16px"><div style="display:flex;align-items:baseline;gap:10px"><span class="mono" style="font-size:26px;font-weight:700">${fmt(next.start)}</span><span style="font-size:22px">${next.icon||''}</span></div><div style="font-size:18px;font-weight:700;margin-top:6px">${esc(next.title)}</div>${next.area?`<div style="font-size:13px;color:var(--inkSoft);margin-top:3px">${esc(next.area)}</div>`:''}${next.memo?`<div style="font-size:12.5px;color:var(--inkSoft);margin-top:6px">${esc(next.memo)}</div>`:''}${next.resv?`<div style="display:inline-block;margin-top:9px;background:var(--shuSoft);color:var(--shu);font-size:12px;font-weight:600;padding:4px 10px;border-radius:8px">${esc(next.resv)}</div>`:''}${souvHtml(next.id)}${(next.lat!=null||next.phone)?`<div style="display:flex;gap:8px;margin-top:13px">${next.lat!=null?`<a class="btn p" style="flex:1;padding:10px 0;font-size:13px;text-decoration:none" href="https://www.google.com/maps/search/?api=1&query=${next.lat},${next.lng}" target="_blank" rel="noreferrer">📍 地図で開く</a>`:''}${next.phone?`<a class="btn s" style="flex:0 0 auto;padding:10px 16px;font-size:13px;text-decoration:none" href="tel:${next.phone}">📞 電話</a>`:''}</div>`:''}</div></div>`;}
  else h+=`<div style="text-align:center;color:var(--inkSoft);padding:30px 0"><div style="font-size:30px">🌙</div><div style="font-size:14px;font-weight:600;color:var(--ink);margin-top:6px">本日の予定は完了！</div></div>`;
  if(rest.length){h+=`<div class="sec" style="margin-top:18px">このあと</div>`;rest.forEach(it=>{h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--rule)"><span class="mono" style="font-size:13px;color:var(--inkSoft);width:42px">${fmt(it.start)}</span><span style="font-size:15px">${it.icon||''}</span><span style="font-size:13.5px;flex:1">${esc(it.title)}</span></div>`;});}
  document.getElementById('v-today').innerHTML=h;
}
function bump(d){state.now=Math.max(0,Math.min(1439,state.now+d));renderToday();}

/* 地図（ピン＝予定） */
function ensureMap(){
  if(typeof L==='undefined'){document.getElementById('map').innerHTML='<div style="padding:24px;font-size:13px;color:#5A6B86">地図ライブラリを読み込めませんでした。ダウンロードしてご自分のブラウザで開いてみてください。</div>';renderMapList();return;}
  if(!mapInit){map=L.map('map',{zoomControl:true}).setView([39.7,140.0],7);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);map.on('click',onMapClick);map.on('contextmenu',e=>{if(e.originalEvent)e.originalEvent.preventDefault();onLongPress(e.latlng);});bindLongPress();mapInit=true;}
  drawMap();fitMap();
  setTimeout(()=>map&&map.invalidateSize(),250);renderMapList();
}
function locatedItems(){const r=[];state.itin.forEach((d,i)=>d.items.forEach(it=>{if(it.lat!=null)r.push({day:i,it});}));return r;}
function fitMap(){const li=locatedItems();if(li.length){try{map.fitBounds(li.map(x=>[x.it.lat,x.it.lng]),{padding:[40,40]});}catch(e){}}}
function itemIcon(it){const c=CAT[it.cat]||'#2C3E6B';return L.divIcon({className:'',iconSize:[30,30],iconAnchor:[15,30],popupAnchor:[0,-28],html:`<div class="pin" style="--c:${c}"><span>${it.icon||'📍'}</span></div>`});}
function photoIcon(p){return L.divIcon({className:'',iconSize:[46,46],iconAnchor:[23,23],popupAnchor:[0,-20],html:`<div class="photopin"><img src="${p.thumb}"></div>`});}
function drawMap(){if(!map)return;if(!layer)layer=L.layerGroup().addTo(map);layer.clearLayers();
  locatedItems().forEach(({day,it})=>{const mk=L.marker([it.lat,it.lng],{icon:itemIcon(it),draggable:true}).addTo(layer);mk.bindPopup(`<div class="pop"><b>${esc(it.title)}</b><div class="t">DAY${day+1} · ${it.cat}費</div>${it.memo?`<div class="t">${esc(it.memo)}</div>`:''}</div>`);mk.on('click',()=>openItemEd(day,it.id));mk.on('dragend',e=>{const ll=e.target.getLatLng();it.lat=ll.lat;it.lng=ll.lng;saveState();});});
  state.photos.filter(p=>p.lat!=null).forEach(p=>{const mk=L.marker([p.lat,p.lng],{icon:photoIcon(p),draggable:true}).addTo(layer);mk.bindPopup(`<div class="pop"><b>${esc(p.name||'写真')}</b><div class="t">${p.gps?'📷 GPSから配置':'手動配置'}</div><img src="${p.thumb}"></div>`);mk.on('dragend',e=>{const ll=e.target.getLatLng();p.lat=ll.lat;p.lng=ll.lng;p.gps=false;savePhotos();});});}
function renderMapList(){
  const li=locatedItems().sort((a,b)=>a.day-b.day);
  let h=`<div class="sec">地図のスポット＝予定 (${li.length})</div>`;
  if(!li.length)h+=`<div class="empty">地図を長押し、または「＋スポット」で予定を追加できる。</div>`;
  li.forEach(({day,it})=>{h+=`<div class="row" onclick="focusItem('${it.id}')"><span class="dot" style="background:${CAT[it.cat]}"></span><span class="nm">${it.icon||'📍'} ${esc(it.title)}</span><span class="tm mono">D${day+1}</span></div>`;});
  h+=`<div class="sec" style="margin-top:14px">写真 (${state.photos.length})</div>`;
  if(!state.photos.length)h+=`<div class="empty">「＋写真」で追加。位置情報つきの写真なら自動でピンが立つよ📷</div>`;
  else{h+=`<div class="strip">`;state.photos.forEach(p=>{h+=`<div class="ph"><img class="im" src="${p.thumb}" onclick="${p.lat!=null?`flyTo(${p.lat},${p.lng})`:`startPlace('${p.id}')`}"><div class="cap ${p.lat!=null?'ok':'no'}" ${p.lat==null?`onclick="startPlace('${p.id}')"`:''}>${p.lat!=null?(p.gps?'GPS✓':'配置済'):'位置を指定'}</div></div>`;});h+=`</div>`;}
  document.getElementById('mlist').innerHTML=h;
}
function focusItem(id){const f=findItem(id);if(f&&f.item.lat!=null){map&&map.panTo([f.item.lat,f.item.lng]);openItemEd(f.day,id);}}
function newLocatedItem(lat,lng){const it=makeItem({title:'新しいスポット',lat,lng});state.itin[state.day].items.push(it);normalize(state.day);saveState();drawMap();renderMapList();openItemEd(state.day,it.id,true);}
function addMapSpot(){const c=map?map.getCenter():{lat:39.7,lng:140};newLocatedItem(c.lat,c.lng);toast('ピンをドラッグで位置調整できるよ');}
let _lpTs=0;
function onLongPress(ll){const now=Date.now();if(now-_lpTs<900)return;_lpTs=now;newLocatedItem(ll.lat,ll.lng);toast('ピンを追加→編集してね');}
function bindLongPress(){
  const el=document.getElementById('map');let timer=null,sx=0,sy=0;
  const clear=()=>{if(timer){clearTimeout(timer);timer=null;}};
  el.addEventListener('touchstart',e=>{if(e.touches.length!==1){clear();return;}const t=e.touches[0];sx=t.clientX;sy=t.clientY;clear();timer=setTimeout(()=>{timer=null;const r=el.getBoundingClientRect();const ll=map.containerPointToLatLng(L.point(sx-r.left,sy-r.top));onLongPress(ll);},550);},{passive:true});
  el.addEventListener('touchmove',e=>{const t=e.touches[0];if(t&&Math.hypot(t.clientX-sx,t.clientY-sy)>12)clear();},{passive:true});
  el.addEventListener('touchend',clear);el.addEventListener('touchcancel',clear);
}
function onFiles(ev){[...ev.target.files].forEach(f=>processPhoto(f));ev.target.value='';}
function processPhoto(file){makeThumb(file,thumb=>{const p={id:uid(),name:file.name.replace(/\.[^.]+$/,''),thumb,lat:null,lng:null,gps:false};readGPS(file,(lat,lng)=>{if(lat!=null){p.lat=lat;p.lng=lng;p.gps=true;}state.photos.push(p);renderMapList();drawMap();savePhotos();if(lat!=null){toast('📷 GPSからピンを立てた！');flyTo(lat,lng);}else toast('位置情報なし→地図で配置してね');});});}
function makeThumb(file,cb){const url=URL.createObjectURL(file),img=new Image();img.onload=()=>{const max=200,s=Math.min(max/img.width,max/img.height,1),c=document.createElement('canvas');c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);c.getContext('2d').drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);try{cb(c.toDataURL('image/jpeg',0.6));}catch(e){cb(url);}};img.onerror=()=>cb(url);img.src=url;}
function readGPS(file,cb){if(typeof EXIF==='undefined'){cb(null);return;}try{EXIF.getData(file,function(){const la=EXIF.getTag(this,'GPSLatitude'),laR=EXIF.getTag(this,'GPSLatitudeRef'),lo=EXIF.getTag(this,'GPSLongitude'),loR=EXIF.getTag(this,'GPSLongitudeRef');if(la&&lo)cb(dms(la,laR),dms(lo,loR));else cb(null);});}catch(e){cb(null);}}
function dms(d,ref){let v=(+d[0])+(+d[1])/60+(+d[2])/3600;if(ref==='S'||ref==='W')v=-v;return v;}
function startPlace(id){state.placePhoto=id;document.getElementById('placebar').classList.add('on');toast('地図をタップしてね');}
function cancelPlace(){state.placePhoto=null;document.getElementById('placebar').classList.remove('on');}
function onMapClick(e){if(state.placePhoto){const p=state.photos.find(x=>x.id===state.placePhoto);if(p){p.lat=e.latlng.lat;p.lng=e.latlng.lng;p.gps=false;}cancelPlace();drawMap();renderMapList();savePhotos();toast('配置した！');}}
function flyTo(lat,lng){map&&map.flyTo([lat,lng],13,{duration:.6});}

/* MD 完全往復 */
function buildMarkdown(){
  const L2=[];L2.push('# 🌊 '+state.trip.name,'## '+state.trip.title+'｜'+tripSub(),'');
  state.itin.forEach((d,i)=>{const s=sched(i);L2.push(`## 📅 DAY ${i+1}（${dDate(i)}）${d.label}`,'','| 時刻 | 予定 | メモ |','|---|---|---|');s.forEach(it=>{const note=[it.area,it.memo,it.resv].filter(Boolean).join(' / ').replace(/\|/g,'／');L2.push(`| **${fmt(it.start)}** | ${it.icon||''} ${it.title} | ${note} |`);});L2.push('');});
  const cLo={},cHi={};let tLo=0,tHi=0;state.itin.flatMap(d=>d.items).forEach(it=>{cLo[it.cat]=(cLo[it.cat]||0)+(it.cLo||0);cHi[it.cat]=(cHi[it.cat]||0)+(it.cHi||0);tLo+=it.cLo||0;tHi+=it.cHi||0;});
  L2.push('## 💰 予算（安め〜高め）','','| 分類 | 金額 |','|---|---|');Object.keys(CAT).filter(c=>cHi[c]).forEach(c=>L2.push(`| ${c}費 | ${cLo[c]===cHi[c]?yen(cLo[c]):yen(cLo[c])+'〜'+yen(cHi[c])} |`));L2.push(`| **合計** | **${yen(tLo)}〜${yen(tHi)}** |`,'');
  const left=state.packing.filter(p=>!p.done).map(p=>p.name);L2.push('## 🎒 持ち物（残り）','',left.length?left.map(x=>`- [ ] ${x}`).join('\n'):'- ✅ 忘れ物なし','');
  const sv=state.souv;
  if(sv.length){L2.push('## 🎁 お土産','');const bs={};sv.forEach(s=>{(bs[s.spotId||'']=bs[s.spotId||'']||[]).push(s);});const ks=Object.keys(bs).sort((a,b)=>{const fa=findItem(a),fb=findItem(b);return (fa?fa.day:99)-(fb?fb.day:99);});ks.forEach(k=>{L2.push(`**${k?spotLabel(k):'買う場所 未定'}**`);bs[k].forEach(s=>L2.push(`- [${s.bought?'x':' '}] ${s.name}${s.price?' '+yen(s.price):''}${s.to?' →'+s.to:''}${s.memo?'（'+s.memo+'）':''}`));L2.push('');});}
  const payload={v:5,trip:state.trip,itin:state.itin,packing:state.packing.map(p=>({name:p.name,grp:p.grp,done:p.done})),souv:state.souv.map(s=>({name:s.name,spotId:s.spotId,price:s.price,to:s.to,memo:s.memo,bought:s.bought}))};
  L2.push('<!-- 旅の司令塔データ（そのまま読み込めば完全復元） -->','```tripdata',JSON.stringify(payload),'```','');
  return L2.join('\n');
}
function renderMD(){const md=buildMarkdown();document.getElementById('v-md').innerHTML=`<div style="font-size:13px;font-weight:700;margin-bottom:4px">書き出し（Markdown）</div><div style="font-size:11.5px;color:var(--inkSoft);margin-bottom:8px">旅程・予算・持ち物を出力。末尾のデータ枠込みで保存すれば<b>場所・費用も含めて完全復元</b>できるよ。</div><div style="display:flex;gap:8px;margin-bottom:8px"><button class="btn p" style="flex:1;padding:10px 0;font-size:13px" onclick="copyMD()">コピー</button><button class="btn s" style="flex:1;padding:10px 0;font-size:13px" onclick="downloadMD()">.md保存</button></div><textarea id="mdOut" readonly style="height:170px">${esc(md)}</textarea><div style="height:1px;background:var(--rule);margin:20px 0"></div><div style="font-size:13px;font-weight:700;margin-bottom:4px">読み込み</div><div style="font-size:11.5px;color:var(--inkSoft);margin-bottom:8px">書き出したmdを貼って読み込むと<b>そのまま完全復元</b>。データ枠が無い自由形式は時刻だけ拾うよ。</div><textarea id="mdIn" placeholder="ここにMarkdownを貼り付け…" style="height:120px"></textarea><button class="btn shu" style="width:100%;margin-top:8px;padding:11px 0;font-size:13px" onclick="importMD()">読み込む</button><div id="mdMsg"></div><div class="note">完全往復＝アプリが出したmd（データ枠つき）が対象。v17みたいな自由形式は時刻のみ反映。</div>`;}
function copyMD(){const ta=document.getElementById('mdOut');ta.select();try{document.execCommand('copy');}catch(e){}if(navigator.clipboard)navigator.clipboard.writeText(ta.value).catch(()=>{});toast('コピーした');}
function downloadMD(){try{const blob=new Blob([document.getElementById('mdOut').value],{type:'text/markdown'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='tohoku_trip.md';a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);}catch(e){toast('この環境ではDL不可。コピーを使ってね');}}
function importMD(){
  const txt=document.getElementById('mdIn').value,msg=document.getElementById('mdMsg'),blk=txt.match(/```tripdata\s*([\s\S]*?)```/);
  if(blk){try{const d=JSON.parse(blk[1].trim());if(d.trip)state.trip=Object.assign({},TRIP0,d.trip);if(d.itin)state.itin=d.itin.map(dd=>({n:dd.n,label:dd.label,date:dd.date,items:dd.items.map(it=>Object.assign({},it,it.id?{}:{id:uid()}))}));if(d.packing)state.packing=d.packing.map(p=>Object.assign({id:uid()},p));if(d.souv)state.souv=d.souv.map(s=>Object.assign({id:uid()},s));state.itin.forEach((_,i)=>normalize(i));saveState();renderTop();if(mapInit){drawMap();fitMap();}msg.innerHTML=`<div style="margin-top:10px;font-size:12px;font-weight:600;color:var(--grn);background:#E3F0EA;border-radius:8px;padding:9px 11px">✓ 完全復元したよ（旅程・場所・費用・持ち物）</div>`;return;}catch(e){msg.innerHTML=`<div style="margin-top:10px;font-size:12px;font-weight:600;color:var(--shu);background:var(--shuSoft);border-radius:8px;padding:9px 11px">データ枠の解析に失敗。全文を貼ってみて</div>`;return;}}
  let mt=0,seen=0;txt.split('\n').forEach(line=>{const tm=line.match(/(\d{1,2}):(\d{2})/);if(!tm)return;seen++;const min=(+tm[1])*60+(+tm[2]);for(const d of state.itin)for(const it of d.items){if(line.includes(it.title)||(it.title.length>=4&&line.includes(it.title.slice(0,4)))){if(it.fixed)it.t=min;else it.at=min;mt++;return;}}});
  if(mt){state.itin.forEach((_,i)=>normalize(i));saveState();msg.innerHTML=`<div style="margin-top:10px;font-size:12px;font-weight:600;color:var(--grn);background:#E3F0EA;border-radius:8px;padding:9px 11px">✓ ${mt}件の時刻を反映（時刻のみ）</div>`;}
  else msg.innerHTML=`<div style="margin-top:10px;font-size:12px;font-weight:600;color:var(--shu);background:var(--shuSoft);border-radius:8px;padding:9px 11px">${seen?'一致する予定が無かった':'読み込める内容が無い'}</div>`;
}

function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('on');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on'),1700);}
(function(){bootstrap();renderShiori();setScreen('list');})();
</script>
